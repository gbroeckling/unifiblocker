name: Bug Report
description: Report a bug in UniFi Blocker
labels: ["bug"]
body:
  - type: input
    id: unifiblocker_version
    attributes:
      label: UniFi Blocker version
      description: "The version of UniFi Blocker you are running (e.g. 0.1.0)."
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: "The version of Home Assistant Core you are running."
      placeholder: "2025.2.0"
    validations:
      required: true

  - type: dropdown
    id: controller
    attributes:
      label: UniFi controller model
      description: "Which UniFi OS controller are you using?"
      options:
        - UCG Max
        - UDM
        - UDM Pro
        - UDM Pro Max
        - UDM SE
        - Cloud Key Gen2 Plus
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the bug."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Step-by-step instructions to reproduce the issue."
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Relevant log output from Home Assistant (Settings > System > Logs)."
      render: shell
    validations:
      required: false
