<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f9b8e"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#0f9b8e" stroke-width="4"/>

  <!-- Outer network ring dots -->
  <g opacity="0.4" fill="#0f9b8e">
    <circle cx="256" cy="68" r="8"/>
    <circle cx="388" cy="118" r="8"/>
    <circle cx="444" cy="256" r="8"/>
    <circle cx="388" cy="394" r="8"/>
    <circle cx="256" cy="444" r="8"/>
    <circle cx="124" cy="394" r="8"/>
    <circle cx="68" cy="256" r="8"/>
    <circle cx="124" cy="118" r="8"/>
  </g>

  <!-- Connecting lines from dots to center -->
  <g stroke="#0f9b8e" stroke-width="1.5" opacity="0.2">
    <line x1="256" y1="68" x2="256" y2="150"/>
    <line x1="388" y1="118" x2="330" y2="180"/>
    <line x1="444" y1="256" x2="362" y2="256"/>
    <line x1="388" y1="394" x2="330" y2="332"/>
    <line x1="256" y1="444" x2="256" y2="362"/>
    <line x1="124" y1="394" x2="182" y2="332"/>
    <line x1="68" y1="256" x2="150" y2="256"/>
    <line x1="124" y1="118" x2="182" y2="180"/>
  </g>

  <!-- Shield body -->
  <path d="M256 110
           C256 110 160 140 140 160
           C140 160 130 260 140 310
           C150 360 200 410 256 440
           C312 410 362 360 372 310
           C382 260 372 160 372 160
           C352 140 256 110 256 110Z"
        fill="url(#shield)" opacity="0.9" filter="url(#glow)"/>

  <!-- Shield highlight -->
  <path d="M256 130
           C256 130 175 155 160 170
           C160 170 152 255 160 298
           C168 341 210 385 256 410
           C302 385 344 341 352 298
           C360 255 352 170 352 170
           C337 155 256 130 256 130Z"
        fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>

  <!-- Block symbol: circle with diagonal line -->
  <g transform="translate(256,265)" filter="url(#glow)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#bolt)" stroke-width="10" stroke-linecap="round"/>
    <line x1="-42" y1="42" x2="42" y2="-42" stroke="url(#bolt)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Small lock icon at top of shield -->
  <g transform="translate(256,165)">
    <rect x="-14" y="-4" width="28" height="22" rx="4" fill="#fff" opacity="0.9"/>
    <path d="M-8,-4 L-8,-12 A8,8 0 0 1 8,-12 L8,-4" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
  </g>
</svg>
